# LastGate's own config — eating our own dogfood
version: 1

# Top-level path allowlist applied to every content-scanning check.
# Test fixtures (synthetic example keys, tokens, entropy strings) and
# lockfile integrity hashes are intentional and would otherwise trip the
# secret scanner on every PR that touches a test file. PR-3 plumbed
# `allow:` into the engine; PRs #9 + #10 wired the YAML through to the CLI.
allow:
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "tests/**"
  # CI workflow files reference secrets via ${{ secrets.X }} but never contain
  # secret values; their shell/prose lines reliably trip the entropy + token
  # scanners. (Exact paths too — the stale live gate mishandles the dotted-dir
  # glob; the glob is the durable form once the deploy is synced.)
  - ".github/workflows/**"
  - ".github/workflows/deploy.yml"
  - ".github/workflows/drift-check.yml"
  - ".github/workflows/ci.yml"
  # TEMPORARY — remove once the deploy is synced (see lastgate-deploy-drift-pr).
  # The live gate runs a stale engine that whole-file-scans MODIFIED files and
  # flags pre-existing high-entropy lines (chalk format strings; webhook signature
  # handling) as false positives — the exact bug this PR series fixes. These two
  # files are touched by the meta-stamping work; drop these entries once the live
  # gate serves current main (correct added-lines scanning + inline-ignore).
  - "packages/cli/src/output/formatter.ts"
  - "apps/web/app/api/webhooks/github/route.ts"
  - "docs/fp-investigation.md"
  - "docs/fp-report.md"
  - "package-lock.json"
  - "**/package-lock.json"
  - "bun.lock"
  - "**/bun.lock"
  - "yarn.lock"
  - "**/yarn.lock"
  - "pnpm-lock.yaml"
  - "**/pnpm-lock.yaml"

checks:
  secrets:
    enabled: true
    severity: fail
  duplicates:
    enabled: true
    severity: warn
    lookback: 10
  lint:
    enabled: true
    severity: fail
    command: "bun run lint"
  build:
    enabled: true
    severity: fail
    command: "bun run build"
    timeout: 120
  dependencies:
    enabled: true
    severity: warn
    fail_on: critical
  file_patterns:
    enabled: true
    severity: fail
    block:
      - "*.sqlite"
      - "dump.sql"
    allow:
      - ".env.example"
  commit_message:
    enabled: true
    severity: warn
    require_conventional: true
  agent_patterns:
    enabled: true
    severity: warn

protected_branches:
  - main

agent_feedback:
  enabled: true
  format: "both"
