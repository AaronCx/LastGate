name: Dependabot lockfile regen

# Dependabot's npm updater bumps package.json manifests but does not
# regenerate bun.lock, so every npm PR fails CI's --frozen-lockfile step
# and auto-merge can never fire. This workflow runs on Dependabot's npm
# PR branches, regenerates the lockfiles, and pushes the result back to
# the PR branch, which retriggers CI on the new head.
#
# Requirement (fails loudly if missing): a fine-grained PAT scoped to this
# repo with Contents: Read and write, stored as a DEPENDABOT secret named
# AUTOMERGE_TOKEN (Settings > Secrets and variables > Dependabot).
# Dependabot-triggered workflow runs read the Dependabot secret store, not
# the Actions one. The default GITHUB_TOKEN cannot be used here: its pushes
# do not retrigger CI, which would leave the PR permanently stuck.
#
# Loop safety: our own push retriggers this workflow; the second run finds
# nothing to regenerate and exits without committing.

on: pull_request

permissions:
  contents: read # the push uses the PAT, not GITHUB_TOKEN

concurrency:
  group: lockfile-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  regen:
    name: Regenerate bun.lock
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/npm_and_yarn')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require the PAT
        env:
          TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::AUTOMERGE_TOKEN is not set as a Dependabot secret (Settings > Secrets and variables > Dependabot). Without it the lockfile cannot be regenerated and this PR cannot go green."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.AUTOMERGE_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.x" # keep in sync with ci.yml

      # --ignore-scripts: lockfile resolution never needs lifecycle scripts,
      # and freshly bumped third-party packages should not execute code in a
      # job that holds a PAT. Bun's trustedDependencies default already blocks
      # dependency scripts; this is belt and braces.
      - name: Regenerate lockfiles
        run: |
          set -euo pipefail
          bun install --ignore-scripts
          (cd extensions/vscode && bun install --ignore-scripts)

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- bun.lock extensions/vscode/bun.lock; then
            echo "lockfiles already in sync; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock extensions/vscode/bun.lock
          git commit -m "chore(deps): regenerate bun.lock for Dependabot bump"
          git push
          echo "pushed regenerated lockfiles; CI will re-run on the new head"
