name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # Required for npm provenance attestation (--provenance on publish).
  id-token: write

jobs:
  publish:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Exact pin for releases: the published artifact should never depend
          # on whatever "latest" happened to be that day.
          bun-version: "1.3.14"

      - name: Install dependencies (locked)
        run: bun install --frozen-lockfile

      # Gate the release on tests; the CLI was once published with no test run.
      - name: Test engine
        run: cd packages/engine && bun test
      - name: Test CLI
        run: cd packages/cli && bun test

      - name: Build engine
        run: cd packages/engine && bun run build

      - name: Build CLI
        run: cd packages/cli && bun run build

      - name: Setup Node for npm publish
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Smoke test the ACTUAL tarball in a clean dir under node; would have
      # caught the workspace:* engine dep, the .ts bin, and the bun-only shebang.
      - name: Smoke test the packaged CLI
        run: |
          cd packages/cli
          TARBALL=$(npm pack | tail -1)
          mkdir -p /tmp/cli-smoke
          cd /tmp/cli-smoke && npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/packages/cli/$TARBALL"
          VERSION=$(node ./node_modules/.bin/lastgate --version)
          echo "Packaged CLI version: $VERSION"
          test -n "$VERSION"

      # --provenance publishes a signed attestation linking the package to this
      # exact commit + workflow run (verifiable on npmjs.com). Requires the
      # repository field in package.json, added in #69.
      - name: Publish to npm
        run: cd packages/cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
