name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Gate the release on tests — the CLI was published with no test run.
      - name: Test engine
        run: cd packages/engine && bun test
      - name: Test CLI
        run: cd packages/cli && bun test

      - name: Build engine
        run: cd packages/engine && bun run build

      - name: Build CLI
        run: cd packages/cli && bun run build

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Smoke test the ACTUAL tarball in a clean dir under node — would have
      # caught the workspace:* engine dep, the .ts bin, and the bun-only shebang.
      - name: Smoke test the packaged CLI
        run: |
          cd packages/cli
          TARBALL=$(npm pack | tail -1)
          mkdir -p /tmp/cli-smoke
          cd /tmp/cli-smoke && npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/packages/cli/$TARBALL"
          VERSION=$(node ./node_modules/.bin/lastgate --version)
          echo "Packaged CLI version: $VERSION"
          test -n "$VERSION"

      - name: Publish to npm
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
