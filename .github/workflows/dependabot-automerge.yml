name: Dependabot auto-merge

# Enables GitHub auto-merge on Dependabot minor/patch PRs. The merge itself
# only happens once ALL required status checks pass, so this is only safe if
# a branch ruleset on main requires the "Test & Build" check (see SETUP notes;
# without a required check, auto-merge fires immediately).
#
# Majors are deliberately excluded: they arrive as individual PRs for human
# review (see the group config in .github/dependabot.yml).
#
# Auto-merge is enabled with a lastgate-app installation token (minted below)
# rather than GITHUB_TOKEN: merges attributed to the app DO trigger downstream
# push workflows on main (the CI deploy job), which the default token's
# anti-recursion rule suppresses. The daily drift check remains the backstop.
# Secrets are Dependabot-scoped (this workflow runs in the Dependabot secrets
# context): LASTGATE_AUTOMERGE_APP_ID + LASTGATE_AUTOMERGE_APP_KEY.

on: pull_request

permissions:
  contents: read
  pull-requests: read

jobs:
  automerge:
    name: Enable auto-merge for minor/patch
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'AaronCx/LastGate'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2

      - name: Mint lastgate-app installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.LASTGATE_AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.LASTGATE_AUTOMERGE_APP_KEY }}

      - name: Enable auto-merge (squash)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
