name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check engine
        run: cd packages/engine && bun run type-check

      - name: Type-check CLI
        run: cd packages/cli && bun run type-check

      - name: Test engine
        run: cd packages/engine && bun test

      - name: Test CLI
        run: cd packages/cli && bun test

      - name: Build engine
        run: cd packages/engine && bun run build

      - name: Build web app
        run: cd apps/web && bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
