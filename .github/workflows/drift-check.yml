name: Deploy Drift Check

# Stops the repo and the live gate from silently diverging: compares the engine
# version the deployment actually serves (GET /api/version) against the version
# in the repo, and fails loudly on a mismatch. Runs daily, on demand, and on
# every push to main. (See lastgate-deploy-drift-pr.)

on:
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  drift:
    name: Engine version drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare deployed engine version to the repo
        env:
          # Override via a repo variable if the production URL differs.
          DEPLOY_URL: ${{ vars.LASTGATE_DEPLOY_URL || 'https://lastgate.vercel.app' }}
        run: |
          set -euo pipefail
          REPO_VERSION=$(jq -r .version packages/engine/package.json)
          echo "repo engine version:     $REPO_VERSION"

          DEPLOYED_VERSION=$(curl -fsS "$DEPLOY_URL/api/version" 2>/dev/null | jq -r '.engineVersion // empty')
          echo "deployed engine version: ${DEPLOYED_VERSION:-<none>}"

          if [ -z "$DEPLOYED_VERSION" ]; then
            echo "::error::no deployed engineVersion — redeploy apps/web from main."
            exit 1
          fi
          if [ "$DEPLOYED_VERSION" != "$REPO_VERSION" ]; then
            echo "::error::drift: deployed $DEPLOYED_VERSION but main is $REPO_VERSION — redeploy."
            exit 1
          fi
          echo "deployed engine v$DEPLOYED_VERSION matches main"
